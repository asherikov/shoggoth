nodes:
  # ============================================
  # Style Templates (invisible)
  # ============================================
  - id: ["", docker_service_style]
    tags: []
    graphviz:
      fillcolor: lightsteelblue
      style: filled
      shape: component

  - id: ["", proxy_style]
    tags: []
    graphviz:
      fillcolor: lightgreen
      style: filled
      shape: box

  # ============================================
  # Client Host Boundary
  # ============================================
  - id: ["Client", client_host]
    graphviz:
      fillcolor: "#f0f0f0"
      style: "filled,dashed"
      shape: folder

  # Client applications
  - id: ["apt", client_apt]
    scope: client_host
    graphviz:
      fillcolor: lightyellow
      style: filled
      shape: box

  - id: ["docker", client_docker]
    scope: client_host
    graphviz:
      fillcolor: lightyellow
      style: filled
      shape: box

  - id: ["ccache/sccache", client_ccache]
    scope: client_host
    graphviz:
      fillcolor: lightyellow
      style: filled
      shape: box

  - id: ["git", client_git]
    scope: client_host
    graphviz:
      fillcolor: lightyellow
      style: filled
      shape: box

  - id: ["AI coding agent", ai_agent]
    scope: client_host
    graphviz:
      fillcolor: lightyellow
      style: filled
      shape: box

  - id: ["Browser", client_browser]
    scope: client_host
    graphviz:
      fillcolor: lightyellow
      style: filled
      shape: box

  # ============================================
  # Shoggoth Host Boundary
  # ============================================
  - id: ["shoggoth.local", shoggoth_host]
    graphviz:
      fillcolor: "#e8f4f8"
      style: "filled,dashed"
      shape: folder

  # Infrastructure group (nameless scope for layout)
  - id: ["", direct_access_group]
    scope: shoggoth_host
    graphviz:
      style: invis

  # Services group (invisible scope for layout)
  - id: ["", behind_proxy_group]
    scope: shoggoth_host
    graphviz:
      style: invis

  # Infrastructure layer
  - id: [":53 DNS", dns_service]
    scope: direct_access_group
    style_notag: docker_service_style

  # Proxy layer (Angie reverse proxy + build cache storage)
  - id: ["web (angie)", service_proxy]
    scope: direct_access_group
    style_notag: docker_service_style

  # Home page within web service
  - id: [":80\nhome page", home_page]
    scope: service_proxy
    graphviz:
      fillcolor: "#f0f8ff"
      style: filled
      shape: note

  # Proxy services scope
  - id: ["proxies", proxy_services]
    scope: service_proxy
    graphviz:
      fillcolor: "#f0f8ff"
      style: "filled,dashed"
      shape: folder

  - id: ["apt-cache.", proxy_apt]
    scope: proxy_services
    style_notag: proxy_style

  - id: [":3022\ngit/ssh", proxy_git]
    scope: proxy_services
    style_notag: proxy_style

  - id: ["gitea-mcp.", proxy_mcp]
    scope: proxy_services
    style_notag: proxy_style

  - id: ["ollama.", proxy_ollama]
    scope: proxy_services
    style_notag: proxy_style

  - id: ["git.", proxy_git_http]
    scope: proxy_services
    style_notag: proxy_style

  - id: ["build-cache.", build_cache]
    scope: service_proxy
    graphviz:
      fillcolor: lightblue
      style: filled
      shape: cylinder

  # Caching layer
  - id: ["apt-cacher-ng", apt_cache]
    scope: behind_proxy_group
    style_notag: docker_service_style

  - id: [":3128\n(docker registry proxy)", docker_cache]
    scope: direct_access_group
    style_notag: docker_service_style

  # Development layer - Gitea services
  - id: ["gitea", gitea_group]
    scope: behind_proxy_group
    graphviz:
      style: filled
      shape: box

  - id: ["gitea", git_service]
    scope: gitea_group
    style_notag: docker_service_style

  - id: ["actions runner", gitea_runner]
    scope: gitea_group
    style_notag: docker_service_style

  - id: ["mcp", gitea_mcp]
    scope: gitea_group
    style_notag: docker_service_style

  - id: ["CI job", ci_job]
    scope: gitea_group
    style_notag: docker_service_style

  # Cache volume mounted to CI jobs
  - id: ["data cache\nvolume", cache_volume]
    scope: gitea_group
    graphviz:
      fillcolor: lightblue
      style: filled
      shape: cylinder


  # AI layer
  - id: ["LLM server\n(ollama)", ollama_service]
    scope: behind_proxy_group
    style_notag: docker_service_style

  # ============================================
  # External Services Group
  # ============================================
  - id: ["External Services", external_services]
    graphviz:
      fillcolor: "#fff8dc"
      style: "filled,dashed"
      shape: folder

  - id: ["APT Repositories\n(Ubuntu/Debian)", apt_repos]
    scope: external_services
    graphviz:
      fillcolor: honeydew
      style: filled
      shape: cylinder

  - id: ["Docker Registries\n(Docker Hub, GHCR, etc.)", docker_registries]
    scope: external_services
    graphviz:
      fillcolor: honeydew
      style: filled
      shape: cylinder

  - id: ["External DNS", external_dns]
    scope: external_services
    graphviz:
      fillcolor: honeydew
      style: filled
      shape: ellipse

edges:
  # ============================================
  # Client -> Shoggoth Services
  # ============================================

  # APT client flow (via proxy)
  - link: [client_apt, proxy_apt]
  - link: [proxy_apt, apt_cache]

  # Docker client flow (direct to docker-cache)
  - link: [client_docker, docker_cache]

  # Build cache flow (via proxy)
  - link: [client_ccache, build_cache]

  # Git client flow (via proxy)
  - link: [client_git, proxy_git]
  - link: [proxy_git, git_service]

  # AI agent flow (via proxy)
  - link: [ai_agent, proxy_mcp]
  - link: [proxy_mcp, gitea_mcp]
  - link: [ai_agent, proxy_ollama]
  - link: [proxy_ollama, ollama_service]

  # Browser flow (via HTTP proxy)
  - link: [client_browser, proxy_git_http]
  - link: [proxy_git_http, git_service]
  - link: [client_browser, home_page]

  # ============================================
  # Internal Shoggoth Service Interactions
  # ============================================

  # Gitea ecosystem
  - link: [git_service, gitea_runner]
  - link: [gitea_runner, docker_cache]
  - link: [gitea_mcp, git_service]
  - link: [ci_job, dns_service]
  - link: [ci_job, apt_cache]
  - link: [ci_job, build_cache]
  - link: [ci_job, cache_volume]
  - link: [gitea_runner, ci_job]

  # ============================================
  # Shoggoth -> External Services
  # ============================================
  - link: [apt_cache, apt_repos]
  - link: [docker_cache, docker_registries]
  - link: [dns_service, external_dns]

  # Invisible edges for layout (direct_access_group -> behind_proxy_group)
  - link: [build_cache, ci_job]
    graphviz:
      style: invis
  - link: [build_cache, apt_cache]
    graphviz:
      style: invis
  - link: [build_cache, git_service]
    graphviz:
      style: invis
  - link: [build_cache, gitea_runner]
    graphviz:
      style: invis
  - link: [build_cache, gitea_mcp]
    graphviz:
      style: invis
  - link: [build_cache, ollama_service]
    graphviz:
      style: invis

views:
  # ============================================
  # Single Unified Architecture View
  # ============================================
  - id: architecture
    graphviz:
      graph:
        rankdir: LR
        compound: "true"
      node:
        fontsize: "11"
        margin: "0.1"
      edge:
        fontsize: "9"

